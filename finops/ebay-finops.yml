specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: eBay
providerId: ebay
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Marketplace
  - Commerce
description: 'FOCUS-aligned FinOps for eBay: developer APIs are free, but commercial costs sit on the
  seller side as final-value fees, insertion fees, store subscriptions, and Promoted Listings ad spend.
  Meters track marketplace transaction economics, not API consumption.'
sources:
  - https://www.ebay.com/sellercenter/selling/seller-fees
  - https://developer.ebay.com/api-docs/sell/finances/overview.html
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: eBay Inc.
serviceCategory: Marketplace
billingModel:
  pricingCategory: Take Rate + Subscription
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Purchase
    - Refund
    - Adjustment
    - Tax
focusColumns:
  ServiceName: eBay Marketplace
  ServiceCategory: Marketplace
  ProviderName: eBay
  PublisherName: eBay Inc.
  InvoiceIssuerName: eBay Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: gmv
    unit: USD
    aggregation: sum
    dimensions:
      - country
      - category
  - name: final_value_fees
    unit: USD
    aggregation: sum
    dimensions:
      - country
      - category
  - name: insertion_fees
    unit: USD
    aggregation: sum
    dimensions:
      - country
      - listing_format
  - name: store_subscription_fees
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - billing_cadence
  - name: promoted_listings_ad_spend
    unit: USD
    aggregation: sum
    dimensions:
      - campaign
      - country
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api
      - app
principles:
  - name: Visibility
    description: Use the Finances API (payouts, transactions, transfers), Analytics API (traffic and
      seller-standards reports), and the Seller Hub Performance dashboards to view fees and revenue per
      listing/category.
  - name: Allocation
    description: Tag listings via custom metadata or SKU prefixes to attribute FVF and ad-spend to brand
      or product line; reconcile with monthly invoices via Finances API.
  - name: Optimization
    description: Match Store tier to monthly listing volume to minimize per-listing fees; tune Promoted
      Listings ad rate; use Recommendation API to act on FVF-relevant signals.
  - name: Accountability
    description: Listing operations owns FVF cost-to-serve KPIs; finance reconciles monthly eBay invoice
      against Finances API line items.
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
