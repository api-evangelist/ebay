              '12500':
                domain: API_BROWSE
                category: REQUEST
                description: This image search results in a response that is too large to return. Either change the image or add additional query parameters and/or filters.
              '12501':
                domain: API_BROWSE
                category: REQUEST
                description: The image data is empty, is not Base64 encoded, or is invalid.
              '12507':
                domain: API_BROWSE
                category: REQUEST
                description: To filter by 'guaranteedDeliveryInDays', you must include 'deliveryCountry'.
              '12508':
                domain: API_BROWSE
                category: REQUEST
                description: To filter by 'guaranteedDeliveryInDays', you must include 'deliveryPostalCode' for the 'deliveryCountry'.
              '12509':
                domain: API_BROWSE
                category: REQUEST
                description: The 'guaranteedDeliveryInDays' value {guaranteedDeliveryInDays} is invalid for 'deliveryCountry' value {deliveryCountry}.  Valid values for 'guaranteedDeliveryInDays' for {deliveryCountry} must be in the range of {rangeLowerBound} to {rangeUpperBound} inclusive.
              '12510':
                domain: API_BROWSE
                category: REQUEST
                description: 'The ''guaranteedDeliveryInDays'' filter is not supported for the marketplace {marketplaceId}. Valid marketplaces are: {validMarketplaces}'
              '12512':
                domain: API_BROWSE
                category: REQUEST
                description: 'The ''qualifiedPrograms'' filter for {filterValue} is not supported for the marketplace {marketplaceId}. Valid marketplaces are: {validMarketplaces}'
              '12515':
                domain: API_BROWSE
                category: REQUEST
                description: The 'offset' value must be either zero or a multiple of the 'limit' value.
        '409':
          description: Conflict
          x-response-codes:
            errors:
              '12013':
                domain: API_BROWSE
                category: BUSINESS
                description: Top level category browsing is not allowed. Please provide keywords or more filters for the applied top level category.
              '12019':
                domain: API_BROWSE
                category: BUSINESS
                description: 'Currently, the {marketplaceId} marketplace is not supported. The supported Marketplaces are: {allowedMarketplaces} .'
              '12020':
                domain: API_BROWSE
                category: BUSINESS
                description: The 'fieldgroups' value {fieldgroups} is invalid when multiple 'category_ids' are specified. Either change the call to have only one value in 'category_ids' or remove the 'fieldgroups'.
              '12513':
                domain: API_BROWSE
                category: BUSINESS
                description: 'The ''priorityListing'' filter for {filterValue} is not supported for the marketplace {marketplaceId}. Valid marketplaces are: {validMarketplaces}'
              '12514':
                domain: API_BROWSE
                category: BUSINESS
                description: The 'priorityListing' filter is not supported for the specified sort option. Refer to the API call documentation.
        '500':
          description: Internal Server Error
          x-response-codes:
            errors:
              '12000':
                domain: API_BROWSE
                category: APPLICATION
                description: There was a problem with an eBay internal system or process. Contact eBay developer support for assistance.
      security:
      - api_auth:
        - https://api.ebay.com/oauth/api_scope
components:
  schemas:
    AutoCorrections:
      type: object
      properties:
        q:
          type: string
          description: The automatically spell-corrected keyword from the request.
    ItemLocationImpl:
      type: object
      properties:
        addressLine1:
          type: string
          description: The first line of the street address.
        addressLine2:
          type: string
          description: The second line of the street address. This field may contain such values as an apartment or suite number.
        city:
          type: string
          description: The city in which the item is located.<br><br><b>Restriction:</b> This field is populated in the <code>search</code> method response <i>only</i> when <code>fieldgroups</code> = <code>EXTENDED</code>.
        country:
          type: string
          description: The two-letter <a href="https://www.iso.org/iso-3166-country-codes.html " target="_blank">ISO 3166</a> standard code that indicates the country in which the item is located. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/buy/browse/types/ba:CountryCodeEnum'>eBay API documentation</a>
        county:
          type: string
          description: The county in which the item is located.
        postalCode:
          type: string
          description: The postal code (or zip code in US) where the item is located. Sellers set a postal code for items when they are listed. The postal code is used for calculating proximity searches. It is anonymized when returned in <code>itemLocation.postalCode</code> via the API.
        stateOrProvince:
          type: string
          description: The state or province in which the item is located.
      description: The type that defines the fields for the location of an item, such as information typically used for an address, including postal code, county, state/province, street address, city, and country (2-digit ISO code).
    Refinement:
      type: object
      properties:
        aspectDistributions:
          type: array
          description: An array of containers for the all the aspect refinements.
          items:
            $ref: '#/components/schemas/AspectDistribution'
        buyingOptionDistributions:
          type: array
          description: An array of containers for the all the buying option refinements.
          items:
            $ref: '#/components/schemas/BuyingOptionDistribution'
        categoryDistributions:
          type: array
          description: An array of containers for the all the category refinements.
          items:
            $ref: '#/components/schemas/CategoryDistribution'
        conditionDistributions:
          type: array
          description: An array of containers for the all the condition refinements.
          items:
            $ref: '#/components/schemas/ConditionDistribution'
        dominantCategoryId:
          type: string
          description: 'The identifier of the category that most of the items are part of. '
      description: This type defines the fields for the various refinements of an item. You can use the information in this container to create histograms, which help shoppers choose exactly what they want.
    ConditionDistribution:
      type: object
      properties:
        condition:
          type: string
          description: The text describing the condition of the item, such as <i>New</i> or <i>Used</i>. For a list of condition names, refer to <a href="/devzone/finding/callref/enums/conditionIdList.html " target="_blank">Item Condition IDs and Names</a>.
        conditionId:
          type: string
          description: The identifier of the condition. For example, <code>1000</code> is the identifier for <code>NEW</code>.
        matchCount:
          type: integer
          description: The number of items having the condition.
          format: int32
        refinementHref:
          type: string
          description: The HATEOAS reference of this condition.
      description: The container that defines the fields for the conditions refinements. This container is returned when <code>fieldgroups</code> is set to <code>CONDITION_REFINEMENTS</code> or <code>FULL</code> in the request.
    TargetLocation:
      type: object
      properties:
        unitOfMeasure:
          type: string
          description: This value shows the unit of measurement used to measure the distance between the location of the item and the buyer's location. This value is typically <code> mi</code> or <code> km</code>.
        value:
          type: string
          description: This value indicates the distance (measured in the measurement unit in the <b> unitOfMeasure</b>  field) between the item location and the buyer's location.
      description: 'The type that defines the fields for the distance between the item location and the buyer''s location. '
    MarketingPrice:
      type: object
      properties:
        discountAmount:
          description: This container returns the monetary amount of the seller discount.
          $ref: '#/components/schemas/ConvertedAmount'
        discountPercentage:
          type: string
          description: This field expresses the percentage of the seller discount based on the value in the <code>originalPrice</code> container.
        originalPrice:
          description: This container returns the monetary amount of the item without the discount.
          $ref: '#/components/schemas/ConvertedAmount'
        priceTreatment:
          type: string
          description: Indicates the pricing treatment (discount) that was applied to the price of the item.<br><br><span class="tablenote"><b>Note:</b> The pricing treatment affects the way and where the discounted price can be displayed.</span> For implementation help, refer to <a href='https://developer.ebay.com/api-docs/buy/browse/types/gct:PriceTreatmentEnum'>eBay API documentation</a>
      description: The type that defines the fields that describe a seller discount.
    AspectDistribution:
      type: object
      properties:
        aspectValueDistributions:
          type: array
          description: An array of containers for the various values of the aspect and the match count, and a HATEOAS reference (<code>refinementHref</code>) for this aspect.
          items:
            $ref: '#/components/schemas/AspectValueDistribution'
        localizedAspectName:
          type: string
          description: The name of an aspect, such as <i>Brand</i>, <i>Color</i>, etc.
      description: The type that define the fields for the aspect information. Aspects are the variations of an item, such as color, size, etc.
    Image:
      type: object
      properties:
        height:
          type: integer
          description: Reserved for future use.
          format: int32
        imageUrl:
          type: string
          description: The URL of the image.
        width:
          type: integer
          description: Reserved for future use.
          format: int32
      description: Type that defines the details of an image, such as size and image URL. Currently, only <code>imageUrl</code> is populated. The <code>height</code> and <code>width</code> are reserved for future use.
    CategoryDistribution:
      type: object
      properties:
        categoryId:
          type: string
          description: The unique identifier of the category.
        categoryName:
          type: string
          description: The name of the category, such as <b>Baby &amp; Toddler Clothing</b>.
        matchCount:
          type: integer
          description: The number of items in this category.
          format: int32
        refinementHref:
          type: string
          description: The HATEOAS reference of this category.
      description: The container that defines the fields for the category refinements. This container is returned when <code>fieldgroups</code> is set to <code>CATEGORY_REFINEMENTS</code> or <code>FULL</code> in the request.
    ItemSummary:
      type: object
      properties:
        additionalImages:
          type: array
          description: An array of containers with the URLs for the images that are in addition to the primary image. The primary image is returned in the <code>image.imageUrl</code> field.
          items:
            $ref: '#/components/schemas/Image'
        adultOnly:
          type: boolean
          description: This indicates if the item is for adults only. For more information about adult-only items on eBay, refer to the <a href="https://www.ebay.com/help/policies/prohibited-restricted-items/adult-items-policy?id=4278 " target="_blank">Adult items policy</a>.
        availableCoupons:
          type: boolean
          description: This boolean attribute indicates if coupons are available for the item.
        bidCount:
          type: integer
          description: This integer value indicates the total number of bids that have been placed for an auction item. This field is only returned for auction items.
          format: int32
        buyingOptions:
          type: array
          description: A comma separated list of all the purchase options available for the item.<br><br><b>Values Returned:</b><ul><li><code>FIXED_PRICE</code><br>Indicates the buyer can purchase the item for a set price using the <i>Buy It Now</i> button.</li><li><code>AUCTION</code><br>Indicates the buyer can place a bid for the item. After the first bid is placed, this becomes a live auction item and is the only buying option for this item.</li><li><code>BEST_OFFER</code><br>Items where the buyer can send the seller a price they are willing to pay for the item. The seller can accept, reject, or send a counter offer. For additional information about Best Offer, refer to <a href="https://www.ebay.com/help/selling/listings/selling-buy-now/adding-best-offer-listing?id=4144 " target="_blank">Adding Best Offer to your listing and sending offers to buyers</a>.</li><li><code>CLASSIFIED_AD</code><br>Indicates that the final sales transaction is to be completed outside of the eBay environment.</li></ul>
          items:
            type: string
        categories:
          type: array
          description: This array returns the name and ID of each category associated with the item, including top level, branch, and leaf categories.
          items:
            $ref: '#/components/schemas/Category'
        compatibilityMatch:
          type: string
          description: This indicates how well an item matches the <code>compatibility_filter</code> product attributes.<br><br><b>Valid Values:</b><ul><li><code>EXACT</code></li><li><code>POSSIBLE</li></ul> For implementation help, refer to <a href='https://developer.ebay.com/api-docs/buy/browse/types/gct:CompatibilityMatchEnum'>eBay API documentation</a>
        compatibilityProperties:
          type: array
          description: This container returns only the product attributes that are compatible with the item. These attributes were specified in the <code>compatibility_filter</code> in the request. This means that if you passed in 5 attributes and only 4 are compatible, only those 4 are returned. If none of the attributes are compatible, this container is not returned.
          items:
            $ref: '#/components/schemas/CompatibilityProperty'
        condition:
          type: string
          description: The text describing the condition of the item, such as <b>New</b> or <b>Used</b>. For a list of condition names, refer to <a href="/devzone/finding/callref/enums/conditionIdList.html " target="_blank">Item Condition IDs and Names</a>.
        conditionId:
          type: string
          description: The identifier of the condition of the item. For example, <code>1000</code> is the identifier for <code>NEW</code>. For a list of condition names and IDs, refer to <a href="/devzone/finding/callref/enums/conditionIdList.html " target="_blank">Item Condition IDs and Names</a>.
        currentBidPrice:
          description: This container returns the current highest bid for an auction item. The <code>value</code> field shows the dollar value of the current highest bid, and the <code>currency</code> field (3-digit ISO code) denotes the currency associated with that bid value. This field is only returned for auction items.
          $ref: '#/components/schemas/ConvertedAmount'
        distanceFromPickupLocation:
          description: This container returns the distance away that the item is from the <code>pickupPostalCode</code> value that was supplied in the method request. This container is only returned if the "local pickup" filter fields are used in the request.
          $ref: '#/components/schemas/TargetLocation'
        energyEfficiencyClass:
          type: string
          description: This indicates the <a href="https://en.wikipedia.org/wiki/European_Union_energy_label " target="_blank">European energy efficiency</a> rating (EEK) of the item. Energy efficiency ratings apply to products listed by commercial vendors in electronics categories only. <br><br>Currently, this field is only applicable for the Germany site, and is returned only if the seller specifies the energy efficiency rating through item specifics at listing time. Rating values include <code>A+++</code>, <code>A++</code>, <code>A+</code>, <code>A</code>, <code>B</code>, <code>C</code>, <code>D</code>, <code>E</code>, <code>F</code>, and <code>G</code>.
        epid:
          type: string
          description: An ePID is the eBay product identifier of a product from the eBay product catalog.  This indicates the product in which the item belongs.
        image:
          description: The URL to the primary image of the item.
          $ref: '#/components/schemas/Image'
        itemAffiliateWebUrl:
          type: string
          description: The URL to the View Item page of the item which includes the affiliate tracking ID.<br><br><span class="tablenote"><b>Note:</b> In order to receive commissions on sales, eBay Partner Network affiliates must use this URL to forward buyers to the listing on the eBay marketplace.</span><br>The <code>itemAffiliateWebUrl</code> is returned only if:<ul><li>The marketplace through which the item is being viewed is part of the eBay Partner Network. Currently Singapore (<code>EBAY_SG</code>) is <b>not</b> supported.<br><br>For additional information, refer to <a href="https://partnerhelp.ebay.com/helpcenter/s/article/countries-available-as-a-program-in-EPN?language=en_US " target="_blank">eBay Partner Network</a>.</li><li>The seller enables affiliate tracking for the item by including the <code><a href="/api-docs/buy/static/api-browse.html#Headers">X-EBAY-C-ENDUSERCTX</a></code> request header in the method.</li></ul>
        itemCreationDate:
          type: string
          description: The date and time when the item listing was created. This value is returned in UTC format (yyyy-MM-ddThh:mm:ss.sssZ), which you can convert into the local time of the buyer.
        itemEndDate:
          type: string
          description: The date and time up to which the item can be purchased. This value is returned in UTC format (yyyy-MM-ddThh:mm:ss.sssZ), which you can convert into the local time of the buyer.<br><br><span class="tablenote"><b>Note:</b> This field is not returned for Good 'Til Cancelled (GTC) listings.</span>
        itemGroupHref:
          type: string
          description: The HATEOAS reference of the parent page of the item group. An item group is an item that has various aspect differences, such as color, size, storage capacity, etc.<br><br><span class="tablenote"><b>Note:</b> This field is returned only for item groups.</span>
        itemGroupType:
          type: string
          description: The indicates the item group type. An item group is an item that has various aspect differences, such as color, size, storage capacity, etc. <br><br>Currently only the <code>SELLER_DEFINED_VARIATIONS</code> is supported and indicates this is an item group created by the seller.<br><br><span class="tablenote"><b>Note:</b> This field is returned only for item groups.</span>
        itemHref:
          type: string
          description: The URI for the Browse API <a href="/api-docs/buy/browse/resources/item/methods/getItem" target="_blank">getItem</a> method, which can be used to retrieve more details about items in the search results.
        itemId:
          type: string
          description: The unique RESTful identifier of the item.
        itemLocation:
          description: This container returns the location of the item. This container consists of fields you typically see for an address, including postal code, county, state/province, street address, city, and country (2-digit ISO code).
          $ref: '#/components/schemas/ItemLocationImpl'
        itemWebUrl:
          type: string
          description: The URL to the View Item page of the item. This enables you to include a "Report Item on eBay" hyperlink that takes the buyer to the View Item page on eBay. From there they can report any issues regarding this item to eBay.
        leafCategoryIds:
          type: array
          description: The leaf category IDs of the item. When the item belongs to two leaf categories, the ID values are returned in the order primary, secondary.
          items:
            type: string
        legacyItemId:
          type: string
          description: The unique identifier of the eBay listing that contains the item. This is the traditional/legacy ID that is often seen in the URL of the listing View Item page.
        listingMarketplaceId:
          type: string
          description: The ID of the eBay marketplace on which the seller listed the item. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/buy/browse/types/ba:MarketplaceIdEnum'>eBay API documentation</a>
        marketingPrice:
          description: This container is returned if the item is eligible for a seller discount and contains the item's original price, and the seller discount amount and percentage.
          $ref: '#/components/schemas/MarketingPrice'
        pickupOptions:
          type: array
          description: This container returns the local pickup options available to the buyer. This container is returned only if the user is searching for local pickup items and set the local pickup filters in the method request.
          items:
            $ref: '#/components/schemas/PickupOptionSummary'
        price:
          description: The price of the item after it has been converted into another currency.<br><br>The price includes the value-added tax (VAT) for applicable jurisdictions when requested from supported marketplaces. In this case, users must do one or more of the following to view VAT-inclusive pricing:<ul><li>Pass the <a href="/api-docs/static/rest-request-components.html#HTTP" target="_blank"><code>X-EBAY-C-MARKETPLACE-ID</code></a> request header specifying the supported marketplace (such as <code>EBAY_GB</code>)</li><li>Pass the <code>contextualLocation</code> values for the supported marketplace in the <a href="/api-docs/buy/static/api-browse.html#Headers" target="_blank"><code>X-EBAY-C-ENDUSERCTX</code></a> request header</li><li>Specify the supported marketplace using the <a href="/api-docs/buy/static/ref-buy-browse-filters.html#deliveryCountry" target="_blank"><code>deliveryCountry</code></a> <code>filter</code> URI parameter (such as <code>filter=deliveryCountry:GB</code>)</li></ul><span class="tablenote"><b>Note:</b> For more information on VAT, refer to <a href="https://www.ebay.co.uk/help/listings/default/vat-obligations-eu?id=4650 " target="_blank">Your VAT Obligations in the UK &amp; EU</a>.</span>
          $ref: '#/components/schemas/ConvertedAmount'
        priceDisplayCondition:
          type: string
          description: Indicates when in the buying flow the item's price can appear for minimum advertised price (MAP) items, which is the lowest price a retailer can advertise/show for this item. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/buy/browse/types/gct:PriceDisplayConditionEnum'>eBay API documentation</a>
        priorityListing:
          type: boolean
          description: This field is returned as <code>true</code> if the listing is part of a Promoted Listing campaign. Promoted Listings are available to <b>Above Standard</b> and <b>Top Rated</b> sellers with recent sales activity.<br><br><span class="tablenote"><b>Note:</b> Priority Listing is returned only with a Best Match sort and will not be returned for other sort options.</span>
        qualifiedPrograms:
          type: array
          description: 'An array of the qualified programs available for the item, such as <code>EBAY_PLUS</code>, <code>AUTHENTICITY_GUARANTEE</code>, and <code>AUTHENTICITY_VERIFICATION</code>.<br><br>eBay Plus is a premium account option for buyers, which provides benefits such as fast, free domestic shipping and free returns on selected items. Top-Rated eBay sellers must opt in to eBay Plus to be able to offer the program on qualifying listings. Sellers must commit to next-day delivery of those items.<br><br><span class="tablenote"><b>Note: </b> eBay Plus is available only to buyers in the Germany, Austria, and Australia marketplaces.</span><br><br>The eBay <a href="https://pages.ebay.com/authenticity-guarantee/ " target="_blank">Authenticity Guarantee</a> program enables third-party authenticators to perform authentication verification inspections on items such as watches and sneakers.'
          items:
            type: string
        seller:
          description: This container returns basic information about the seller of the item, such as name, feedback score, etc.
          $ref: '#/components/schemas/Seller'
        shippingOptions:
          type: array
          description: This container returns the shipping options available to ship the item.
          items:
            $ref: '#/components/schemas/ShippingOptionSummary'
        shortDescription:
          type: string
          description: 'This text string is derived from the item condition and the item aspects (such as size, color, capacity, model, brand, etc.) Sometimes the title does not provide enough information but the description is too big. Surfacing the <code>shortDescription</code> can often provide buyers with the additional information that could help them make a buying decision.<br><br>For example:<pre>"<b>title</b>": "Petrel U42W FPV Drone RC Quadcopter w/HD Camera Live Video One Key Off / Landing",<br>"<b>shortDescription</b>": "1 U42W Quadcopter. Syma X5SW-V3 Wifi FPV RC Drone Quadcopter 2.4Ghz 6-Axis Gyro with Headless Mode. Syma X20 Pocket Drone 2.4Ghz Mini RC Quadcopter Headless Mode Altitude Hold. One Key Take Off / Landing function: allow beginner to easy to fly the drone without any skill.",</pre><br><b>Restriction:</b> This field is returned by the <b>search</b> method only when <code>fieldgroups</code> = <code>EXTENDED</code>.'
        thumbnailImages:
          type: array
          description: An array of thumbnail images for the item.
          items:
            $ref: '#/components/schemas/Image'
        title:
          type: string
          description: The seller-created title of the item.<br><br><b>Maximum Length:</b> 80 characters
        topRatedBuyingExperience:
          type: boolean
          description: 'This indicates if the item is a top-rated plus item. There are three benefits of a top-rated plus item: a  minimum 30-day money-back return policy; shipping the item in 1 business day with tracking provided; and the added comfort of knowing that this item is from an experienced seller with the highest buyer ratings. For more information, refer to <a href="https://pages.ebay.com/topratedplus/index.html " target="_blank">Look for Top Rated Plus Items</a> and <a href="https://www.ebay.com/help/selling/seller-levels-performance-standards/seller-levels-performance-standards?id=4080 " target="_blank">Seller performance overview</a>.'
        tyreLabelImageUrl:
          type: string
          description: The URL to the image that shows the information on the tyre label.
        unitPrice:
          description: 'The price per unit for the item. Some European countries require listings for certain types of products to include the price per unit so buyers can accurately compare prices.<br><br>For example:<pre>"unitPricingMeasure": "100g",<br> "unitPrice": {<br>&nbsp;&nbsp;"value": "7.99",<br>&nbsp;&nbsp;"currency": "GBP"</pre>'
          $ref: '#/components/schemas/ConvertedAmount'
        unitPricingMeasure:
          type: string
          description: 'The designation, such as size, weight, volume, count, etc., that was used to specify the quantity of the item. This helps buyers compare prices.<br><br>For example, the following tells the buyer that the item is 7.99 per 100 grams.<pre>"unitPricingMeasure": "100g",<br> "unitPrice": {<br>&nbsp;&nbsp;"value": "7.99",<br>&nbsp;&nbsp;"currency": "GBP"</pre>'
        watchCount:
          type: integer
          description: The number of users that have added the item to their watch list.<br><br><span class="tablenote"><b>Note:</b> This field is restricted to applications that have been granted permission to access this feature. You must submit an <a href="/my/support/tickets?tab=app-check " target="_blank">App Check ticket</a> to request this access. In the App Check form, add a note to the <b>Application Title/Summary</b> and/or <b>Application Details</b> fields indicating that you want access to Watch Count data in the Browse API.</span>
          format: int32
      description: The type that defines the fields for the details of a specific item.
    SearchPagedCollection:
      type: object
      properties:
        autoCorrections:
          description: The auto-corrected inputs.
          $ref: '#/components/schemas/AutoCorrections'
        href:
          type: string
          description: The URI of the current page of results.<br><br>The following example of the <b>search</b> method returns items 1 thru 5 from the list of items found.<pre>https://api.ebay.com/buy/v1/item_summary/search?q=shirt&limit=5&offset=0</pre>.
        itemSummaries:
          type: array
          description: An array of the items on this page. The items are sorted according to the sorting method specified in the request.
          items:
            $ref: '#/components/schemas/ItemSummary'
        limit:
          type: integer
          description: The value of the <code>limit</code> parameter submitted in the request, which is the maximum number of items to return on a page, from the result set. A result set is the complete set of items returned by the method.
          format: int32
        next:
          type: string
          description: The URI for the next page of results. This value is returned if there is an additional page of results to return from the result set.<br><br>The following example of the <b>search</b> method returns items 5 thru 10 from the list of items found.<pre>https://api.ebay.com/buy/v1/item_summary/search?query=t-shirts&limit=5&offset=10</pre>
        offset:
          type: integer
          description: This value indicates the <code>offset</code> used for current page of items being returned. Assume the initial request used an <code>offset</code> of <code>0</code> and a <code>limit</code> of <code>3</code>. Then in the first page of results, this value would be <code>0</code>, and items 1-3 are returned. For the second page, this value is <code>3</code> and so on.
          format: int32
        prev:
          type: string
          description: The URI for the previous page of results. This is returned if there is a previous page of results from the result set.<br><br>The following example of the <b>search</b> method returns items 1 thru 5 from the list of items found, which would be the first set of items returned.<pre>https://api.ebay.com/buy/v1/item_summary/search?query=t-shirts&limit=5&offset=0</pre>
        refinement:
          description: The container for all the search refinements.
          $ref: '#/components/schemas/Refinement'
        total:
          type: integer
          description: The total number of items that match the input criteria.<br><br><span class="tablenote"><b>Note:</b> <code>total</code> is just an indicator of the number of listings for a given query. It could vary based on the number of listings with variations included in the result. It is strongly recommended that <code>total</code> not be used in pagination use cases. Instead, use <a href="/api-docs/buy/browse/resources/item_summary/methods/search#response.next ">next</a> to determine the results on the next page.</span>
          format: int32
        warnings:
          type: array
          description: The container with all the warnings for the request.
          items:
            $ref: '#/components/schemas/Error'
      description: The type that defines the fields for a paginated result set. The response consists of 0 or more sequenced <i>pages</i> where each page has 0 or more items.
    ShippingOptionSummary:
      type: object
      properties:
        guaranteedDelivery:
          type: boolean
          description: Although this field is still returned, it can be ignored since eBay Guaranteed Delivery is no longer a supported feature on any marketplace. This field may get removed from the schema in the future.
        maxEstimatedDeliveryDate:
          type: string
          description: 'The end date of the delivery window (latest projected delivery date). This value is returned in UTC format (yyyy-MM-ddThh:mm:ss.sssZ), which you can convert into the local time of the buyer.<br><br><span class="tablenote"> <b>Note: </b> For the best accuracy, always include the <code>contextualLocation</code> values in the <a href="/api-docs/buy/static/api-browse.html#Headers" target="_blank"><code>X-EBAY-C-ENDUSERCTX</code></a> request header.</span>'
        minEstimatedDeliveryDate:
          type: string
          description: The start date of the delivery window (earliest projected delivery date). This value is returned in UTC format (yyyy-MM-ddThh:mm:ss.sssZ), which you can convert into the local time of the buyer.<br><br><span class="tablenote"><b>Note:</b> For the best accuracy, always include the <code>contextualLocation</code> values in the <a href="/api-docs/buy/static/api-browse.html#Headers" target="_blank"><code>X-EBAY-C-ENDUSERCTX</code></a> request header.</span>
        shippingCost:
          description: This is the estimated price to ship the item.<br><br>The price includes the value-added tax (VAT) for applicable jurisdictions when requested from supported marketplaces. In this case, users must do one or more of the following to see VAT-inclusive pricing:<ul><li>Pass the <a href="/api-docs/static/rest-request-components.html#HTTP" target="_blank"><code>X-EBAY-C-MARKETPLACE-ID</code></a> request header specifying the supported marketplace (such as <code>EBAY_GB</code>)</li><li>Pass the <code>contextualLocation</code> values for the supported marketplace in the <a href="/api-docs/buy/static/api-browse.html#Headers"><code>X-EBAY-C-ENDUSERCTX</code></a> request header</li><li>Specify the supported marketplace using the <a href="/api-docs/buy/static/ref-buy-browse-filters.html#deliveryCountry" target="_blank"><code>deliveryCountry</code></a> <b>filter</b> URI parameter (such as <code>filter=deliveryCountry:GB</code>)</li></ul><span class="tablenote"><b>Note:</b>For more information on VAT, refer to <a href="https://www.ebay.co.uk/help/listings/default/vat-obligations-eu?id=4650 " target="_blank">Your VAT Obligations in the UK &amp; EU</a>.</span>
          $ref: '#/components/schemas/ConvertedAmount'
        shippingCostType:
          type: string
          description: Indicates the type of shipping used to ship the item. Possible values are <code>FIXED</code> (flat-rate shipping) and <code>CALCULATED</code> (shipping cost calculated based on item and buyer location).
      description: The type that defines the fields for the shipping information.
    ConvertedAmount:
      type: object
      properties:
        convertedFromCurrency:
          type: string
          description: The three-letter <a href="https://www.iso.org/iso-4217-currency-codes.html " target="_blank">ISO 4217</a> code representing the currency of the amount in the <code>convertedFromValue</code> field. This value is required or returned only if currency conversion/localization is required, and represents the pre-conversion currency. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/buy/browse/types/ba:CurrencyCodeEnum'>eBay API documentation</a>
        convertedFromValue:
          type: string
          description: The monetary amount before any conversion is performed, in the currency specified by the <code>convertedFromCurrency</code> field. This value is required or returned only if currency conversion/localization is required. The <code>value</code> field contains the converted amount of this value, in the currency specified by the <code>currency</code> field.
        currency:
          type: string
          description: The three-letter <a href="https://www.iso.org/iso-4217-currency-codes.html " target="_blank">ISO 4217</a> code representing the currency of the amount in the <code>value</code> field. If currency conversion/localization is required, this is the post-conversion currency of the amount in the <code>value</code> field.<br><br><b>Default:</b> The currency of the authenticated user's country. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/buy/browse/types/ba:CurrencyCodeEnum'>eBay API documentation</a>
        value:
          type: string
          description: The monetary amount in the currency specified by the <code>currency</code> field. If currency conversion/localization is required, this value is the converted amount, and the <code>convertedFromValue</code> field contains the amount in the original currency.
      description: This type defines the monetary value of an amount. It can provide the amount in both the currency used on the eBay site where an item is being offered and the conversion of that value into another currency, if applicable.
    Error:
      type: object
      properties:
        category:
          type: string
          description: 'This string value indicates the error category. There are three categories of errors: <i>request errors</i>, <i>application errors</i>, and <i>system errors</i>.'
        domain:
          type: string
          description: The name of the primary system where the error occurred. This is relevant for application errors.
        errorId:
          type: integer
          description: A unique code that identifies the particular error or warning that occurred. Your application can use error codes as identifiers in your customized error-handling algorithms.
          format: int32
        inputRefIds:
          type: array
          description: An array of reference IDs that identify the specific request elements most closely associated to the error or warning, if any.
          items:
            type: string
        longMessage:
          type: string
          description: A detailed description of the condition that caused the error or warning, and information on what to do to correct the problem.
        message:
          type: string
          description: A description of the condition that caused the error or warning.
        outputRefIds:
          type: array
          description: An array of reference IDs that identify the specific response elements most closely associated to the error or warning, if any.
          items:
            type: string
        parameters:
          type: array
          description: An array of warning and error messages that return one or more variables contextual information about the error or warning. This is often the field or value that triggered the error or warning.
          items:
            $ref: '#/components/schemas/ErrorParameter'
        subdomain:
          type: string
          description: The name of the subdomain in which the error or warning occurred.
      description: The type that defines the fields that can be returned in an error.
    PickupOptionSummary:
      type: object
      properties:
        pickupLocationType:
          type: string
          description: This container returns the local pickup options available to the buyer. Possible values are <code>ARRANGED_LOCATION</code> and <code>STORE</code>.
      description: The type that defines the fields for the local pickup options that are available for the item. It is used by the <code>pickupOptions</code> container.
    Category:
      type: object
      properties:
        categoryId:
          type: string
          description: The unique identifier of the category.
        categoryName:
          type: string
          description: The name of the category.
      description: This type is used by the <code>categories</code> container in the response of the <b>search</b>  method, and contains the name and ID of the item category.
    Seller:
      type: object
      properties:
        feedbackPercentage:
          type: string
          description: The percentage of the total positive feedback.
        feedbackScore:
          type: integer
          description: The feedback score of the seller. This value is based on the ratings from eBay members that bought items from this seller.
          format: int32
        sellerAccountType:
          type: string
          description: Indicates if the seller is a business or an individual. This is determined when the seller registers with eBay:<ul><li>If they register for a business account, this value will be <code>BUSINESS<code>.</li><li>If they register for a private account, this value will be <code>INDIVIDUAL</code>.</li></ul>This designation is required by the tax laws in some countries.<br><br>This field is returned only on the following sites:<br><br>EBAY_AT, EBAY_BE, EBAY_CH, EBAY_DE, EBAY_ES, EBAY_FR, EBAY_GB, EBAY_IE, EBAY_IT, EBAY_PL<br><br><b>Valid Values:</b> <code>BUSINESS</code> or <code>INDIVIDUAL</code>
        username:
          type: string
          description: The user name created by the seller for use on eBay.
      description: The type that defines the fields for basic information about the seller of the item returned by the <code>item_summary</code> resource.
    CompatibilityProperty:
      type: object
      properties:
        localizedName:
          type: string
          description: The name of the product attribute that as been translated to the language of the site.
        name:
          type: string
          description: The name of the product attribute, such as Make, Model, Year, etc.
        value:
          type: string
          description: The value for the <code>name</code> attribute, such as <b>BMW</b>, <b>R1200GS</b>, <b>2011</b>, etc.
      description: This container returns the product attribute name/value pairs that are compatible with the keyword. These attributes are submitted in the <code>compatibility_filter</code> request field.
    BuyingOptionDistribution:
      type: object
      properties:
        buyingOption:
          type: string
          description: The container that returns the buying option type. This will be AUCTION, FIXED_PRICE, CLASSIFIED_AD, or a combination of these options. For details, see <a href="/api-docs/buy/browse/resources/item_summary/methods/search#response.itemSummaries.buyingOptions">buyingOptions</a>.
        matchCount:
          type: integer
          description: The number of items having this buying option.
          format: int32
        refinementHref:
          type: string
          description: The HATEOAS reference for this buying option.
      description: The container that defines the fields for the buying options refinements. This container is returned when <code>fieldgroups</code> is set to <code>BUYING_OPTION_REFINEMENTS</code> or <code>FULL</code> in the request.
    ErrorParameter:
      type: object
      properties:
        name:
          type: string
          description: This is the name of input field that caused an issue with the call request.
        value:
          type: string
          description: This is the actual value that was passed in for the element specified in the <code>name</code> field.
      description: An array of name/value pairs that provide details regarding the error.
    AspectValueDistribution:
      type: object
      properties:
        localizedAspectValue:
          type: string
          description: The value of an aspect. For example, Red is a value for the aspect Color.
        matchCount:
          type: integer
          description: The number of items with this aspect.
          format: int32
        refinementHref:
          type: string
          description: A HATEOAS reference for this aspect.
      description: The container that defines the fields for the conditions refinements. This container is returned when <code>fieldgroups</code> is set to <code>ASPECT_REFINEMENTS</code> or <code>FULL</code> in the request.
    SearchByImageRequest:
      type: object
      properties:
        image:
          type: string
          description: The Base64 string of the image.<br><br>To get the Base64 image string, you can use sites such as <a href="https://codebeautify.org/image-to-base64-converter " target="_blank">https://codebeautify.org/image-to-base64-converter</a>.
      description: The type that defines the fields for the image information.
  securitySchemes:
    api_auth:
      type: oauth2
      description: The security definitions for this API. Please check individual operations for applicable scopes.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.ebay.com/oauth2/authorize
          tokenUrl: https://api.ebay.com/identity/v1/oauth2/token
          scopes:
            https://api.ebay.com/oauth/api_scope/sell.account.readonly: View your account settings
            https://api.ebay.com/oauth/api_scope/sell.account: View and manage your account settings
