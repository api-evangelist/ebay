specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: eBay
providerId: ebay
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Auctions
  - Commerce
  - Products
  - Marketplace
description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: ebay-free
    name: Free
    type: freemium
    description: Free entry tier for the eBay API surface. Intended for evaluation, prototyping, and low-volume
      integrations. Real limits and pricing must be reconciled with the provider's published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://api.ebay.com
          - https://apiz.ebay.com
          - https://apim.ebay.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://api.ebay.com
          - https://apiz.ebay.com
          - https://apim.ebay.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: eBay Account API
      - name: eBay Analytics API
      - name: eBay Compliance API
      - name: eBay Feed API
      - name: eBay Browse API
      - name: eBay Deal API
      - name: eBay Marketing API
      - name: eBay Marketplace Insights API
  - id: ebay-pro
    name: Professional
    type: paid
    description: Production tier for eBay. Provides higher quotas, priority support, and access to the
      broader API portfolio. Pricing placeholder; align with the provider's pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://api.ebay.com
          - https://apiz.ebay.com
          - https://apim.ebay.com
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://api.ebay.com
          - https://apiz.ebay.com
          - https://apim.ebay.com
        unit: 1
        price: '0.00'
        userMultiplied: false
