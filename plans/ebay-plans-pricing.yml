specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: eBay
providerId: ebay
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Marketplace
  - Commerce
  - Auctions
  - Products
description: eBay's developer APIs are free to use (registration required); commercial value flows from
  the underlying marketplace, which charges insertion fees, final-value fees (FVF), and optional eBay
  Store subscriptions. Plans below capture the developer-program access plus the seller-fee surface that
  most API integrations interact with.
sources:
  - https://developer.ebay.com/develop/get-started
  - https://developer.ebay.com/join/api-license-agreement
  - https://www.ebay.com/sellercenter/selling/seller-fees
  - https://www.ebay.com/help/selling/fees-credits-invoices/store-selling-fees?id=4809
plans:
  - id: ebay-developer-program
    name: Developer Program
    type: freemium
    description: Free access to eBay's REST and Trading APIs (Buy, Sell, Commerce, Developer namespaces)
      after creating an eBay developer account and obtaining App ID, Cert ID, Dev ID. Production access
      requires Application Growth Check.
    entries:
      - label: Developer registration
        name: developer_registration
        type: subscription
        metric: account
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Default daily API call quota (per app, per API)
        name: api_daily_default
        type: quota
        metric: requests
        limit: 5000
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Sandbox + production environments
      - name: OAuth user tokens and application tokens
      - name: All Buy / Sell / Commerce / Developer APIs
      - name: Higher quotas via Application Growth Check
  - id: ebay-marketplace-fees
    name: Marketplace Seller Fees
    type: usage-based
    description: Per-listing and per-sale fees applied by eBay to sellers. Pricing varies by category;
      standard FVF for most categories is 13.25% + $0.30 per order under $7,500 (with reduced 2.35% on
      portion above $7,500).
    entries:
      - label: Standard final-value fee (most categories)
        name: fvf_standard
        type: metered
        metric: order
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 13.25% + $0.30
        userMultiplied: false
      - label: Final-value fee on portion above $7,500
        name: fvf_above_threshold
        type: metered
        metric: order
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 2.35%
        userMultiplied: false
      - label: International fee
        name: fvf_international
        type: metered
        metric: order
        limit: -1
        timeFrame: usage
        geo: non-US
        unit: 1
        price: +1.65%
        userMultiplied: false
      - label: Insertion fee (after free monthly allowance)
        name: insertion_fee
        type: metered
        metric: listing
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.35'
        userMultiplied: false
    elements:
      - name: Free zero-insertion listings (250/month no-store; varies by Store tier)
      - name: Promoted Listings (optional ad fees)
      - name: Per-category fee schedule
  - id: ebay-store-starter
    name: eBay Store - Starter
    type: subscription
    description: Entry-tier eBay Store subscription with 250 free listings/month.
    entries:
      - label: Store subscription (monthly)
        name: store_starter_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '7.95'
        userMultiplied: true
      - label: Store subscription (annual)
        name: store_starter_annual
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '4.95'
        userMultiplied: true
    elements:
      - name: 250 free fixed-price listings/month
      - name: Storefront page
  - id: ebay-store-basic
    name: eBay Store - Basic
    type: subscription
    description: Mid-tier Store subscription with reduced FVF and higher free-listing allowance.
    entries:
      - label: Store subscription (monthly)
        name: store_basic_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '27.95'
        userMultiplied: true
      - label: Store subscription (annual)
        name: store_basic_annual
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '21.95'
        userMultiplied: true
    elements:
      - name: 1,000 free fixed-price listings/month
      - name: Reduced FVF on most categories
  - id: ebay-store-premium
    name: eBay Store - Premium
    type: subscription
    description: Higher-volume Store subscription.
    entries:
      - label: Store subscription (monthly)
        name: store_premium_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '74.95'
        userMultiplied: true
      - label: Store subscription (annual)
        name: store_premium_annual
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '59.95'
        userMultiplied: true
    elements:
      - name: 10,000 free fixed-price listings/month
      - name: Vacation hold and dedicated support
  - id: ebay-store-anchor
    name: eBay Store - Anchor
    type: subscription
    description: Top-tier Store subscription targeting heavy sellers.
    entries:
      - label: Store subscription (monthly)
        name: store_anchor_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '349.95'
        userMultiplied: true
      - label: Store subscription (annual)
        name: store_anchor_annual
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '299.95'
        userMultiplied: true
    elements:
      - name: 25,000 free fixed-price listings/month
      - name: Dedicated customer support
  - id: ebay-store-enterprise
    name: eBay Store - Enterprise
    type: subscription
    description: Enterprise-tier Store subscription with unlimited fixed-price listings.
    entries:
      - label: Store subscription (annual)
        name: store_enterprise_annual
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '2999.95'
        userMultiplied: true
    elements:
      - name: 100,000 free fixed-price listings/month
      - name: Dedicated team support
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
