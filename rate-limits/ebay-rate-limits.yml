specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: eBay
providerId: ebay
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Marketplace
  - Commerce
description: eBay rate-limits each application against per-API daily call quotas (per app, per API,
  per day). Default for most production REST APIs is 5,000 calls/day; quotas are raised by passing eBay's
  Application Growth Check. Rate limits are enforced per developer App ID and reset daily at midnight
  Pacific Time.
sources:
  - https://developer.ebay.com/develop/apis/api-call-limits
  - https://developer.ebay.com/api-docs/static/rate-limits.html
headers:
  rateLimit: X-EBAY-C-RATE-LIMIT
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: Default per-API daily quota (production)
    scope: app/api
    metric: requests_per_day
    limit: 5000
    timeFrame: day
    notes: Most Sell, Buy, and Commerce REST APIs default to 5,000 calls/day per app per API; raise via
      Application Growth Check.
  - name: Sandbox per-API daily quota
    scope: app/api
    metric: requests_per_day
    limit: 5000
    timeFrame: day
    notes: Sandbox quotas are typically equal to or lower than production defaults; not for load testing.
  - name: Trading API daily call quota
    scope: app
    metric: requests_per_day
    limit: 5000
    timeFrame: day
    notes: Legacy Trading API; subject to Compatibility Level checks.
  - name: Browse API daily quota
    scope: app
    metric: requests_per_day
    limit: 5000
    timeFrame: day
  - name: Feed API hourly bulk download
    scope: app
    metric: requests_per_hour
    limit: 1000
    timeFrame: hour
    notes: Bulk feed downloads (item, product, snapshot) have separate hourly throttles; consult Feed
      API rate-limits.
policies:
  - name: Application Growth Check
    description: Production access and higher quotas require passing eBay's Application Growth Check
      (formerly Compatible Application Check); submit via the developer dashboard.
  - name: Per-API quotas
    description: Quotas are enforced per app per API (e.g., Browse, Sell-Inventory, Sell-Account); aggregating
      across APIs is not supported.
  - name: Daily reset
    description: Daily counters reset at midnight Pacific Time.
  - name: Backoff
    description: Honor 429 + Retry-After signaling; implement exponential backoff with jitter.
  - name: OAuth-token scope
    description: Per-call quotas are tied to the App ID, not the user OAuth token; tokens may carry per-user
      restrictions in addition to app quotas.
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
