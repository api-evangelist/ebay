naftiko: 1.0.0-alpha2
info:
  label: eBay Identity API — User
  description: 'eBay Identity API — User. 1 operations. Lead operation: User. Self-contained Naftiko capability covering one
    Ebay business surface.'
  tags:
  - Ebay
  - User
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EBAY_API_KEY: EBAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-user
    baseUri: https://apiz.ebay.com{basePath}
    description: eBay Identity API — User business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user/
      operations:
      - name: getuser
        method: GET
        description: This method retrieves the account profile information for an authenticated user, which requires a <a
          href="/api-docs/static/oauth-authorization-code-grant.html">User access token</a>. What is returned is controlled
          by the <a href="#scopes">
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.EBAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: identity-user-rest
    port: 8080
    description: REST adapter for eBay Identity API — User. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: getuser
        description: This method retrieves the account profile information for an authenticated user, which requires a <a
          href="/api-docs/static/oauth-authorization-code-grant.html">User access token</a>. What is returned is controlled
          by the <a href="#scopes">
        call: identity-user.getuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-user-mcp
    port: 9090
    transport: http
    description: MCP adapter for eBay Identity API — User. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: this-method-retrieves-account-profile
      description: This method retrieves the account profile information for an authenticated user, which requires a <a href="/api-docs/static/oauth-authorization-code-grant.html">User
        access token</a>. What is returned is controlled by the <a href="#scopes">
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-user.getuser
      outputParameters:
      - type: object
        mapping: $.
