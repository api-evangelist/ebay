aid: ebay
name: eBay
description: eBay is a multinational e-commerce corporation that operates a website facilitating consumer-to-consumer and
  business-to-consumer sales through its online platform. Users can buy and sell a wide range of products, including electronics,
  fashion, collectibles, and more, in an auction-style or buy-it-now format. eBay provides a secure and user-friendly platform
  for sellers to reach a global audience and for buyers to access a vast selection of items.
url: https://raw.githubusercontent.com/api-evangelist/ebay/refs/heads/main/apis.yml
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
